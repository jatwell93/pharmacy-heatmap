<?xml version="1.0" encoding="UTF-8"?>
<!--
  PharmIQ — Icon Mark Reversed
  For use on dark / navy backgrounds
  Transparent background, white hexagon outline + white bars
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="PharmIQ logo mark (reversed)">
  <title>PharmIQ</title>
  <defs>
    <clipPath id="hex-clip-rev">
      <polygon points="44,24 34,6.68 14,6.68 4,24 14,41.32 34,41.32"/>
    </clipPath>
  </defs>

  <!-- Hexagon outline only (no fill — sits on dark background) -->
  <polygon
    points="44,24 34,6.68 14,6.68 4,24 14,41.32 34,41.32"
    fill="none"
    stroke="white"
    stroke-width="2"
  />

  <!-- Ascending bars: white, clipped to hexagon -->
  <g clip-path="url(#hex-clip-rev)">
    <rect x="11" y="29" width="7" height="10" rx="1.5" fill="white" fill-opacity="0.85"/>
    <rect x="20.5" y="21" width="7" height="18" rx="1.5" fill="white"/>
    <rect x="30" y="11" width="7" height="28" rx="1.5" fill="white"/>
  </g>
</svg>
